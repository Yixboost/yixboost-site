<!-- Scroll To Top Button -->
<script>
    window.addEventListener("scroll", function () {
        var scrollToTopButton = document.getElementById("scrollToTopButton");
        if (window.pageYOffset > 100) {
            scrollToTopButton.classList.add("show");
        } else {
            scrollToTopButton.classList.remove("show");
        }
    });

    document.getElementById("scrollToTopButton").addEventListener("click", function () {
        window.scrollTo({
            top: 0,
            behavior: "smooth"
        });
    });
</script>

<!-- CSS Reloading -->
<script>
    function reloadCSS() {
        const links = [
            "<?php echo (isset($_SERVER['HTTPS']) ? 'https://' : 'http://') . $_SERVER['HTTP_HOST'] . '/'; ?>/yixboost/assets/font-awesome-6-pro-main/css/all.css",
            "<?php echo (isset($_SERVER['HTTPS']) ? 'https://' : 'http://') . $_SERVER['HTTP_HOST'] . '/'; ?>/yixboost/assets/css/templatemo-cyborg-gaming.css",
            "assets/css/owl.css",
            "assets/css/animate.css",
            "https://unpkg.com/swiper@7/swiper-bundle.min.css"
        ];

        links.forEach(function(link) {
            const newLink = document.createElement("link");
            newLink.rel = "stylesheet";
            newLink.href = link + "?v=" + new Date().getTime(); // Voeg timestamp toe aan de URL
            document.head.appendChild(newLink);
        });

        const styleTags = document.querySelectorAll("style");
        styleTags.forEach(function(styleTag) {
            const newStyle = document.createElement("style");
            newStyle.innerHTML = styleTag.innerHTML; // Kopieer de inhoud van de originele style tag
            document.head.appendChild(newStyle);
            styleTag.remove(); // Verwijder de oude style tag
        });
    }

    window.onload = reloadCSS; // CSS wordt opnieuw geladen bij pagina-oplaadbeurt
</script>
